<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
        }

        .container {
            padding: 20px;
        }

        .dashboard-wrapper {
            position: relative;
            width: 100%;
            height: 90vh;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            background: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        h1 {
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Tableau Dashboard</h1>

        <div class="dashboard-wrapper">
            <iframe 
                src="https://public.tableau.com/views/AnalyticsDashboard-LandingPageNavigation/AnalyticsDashboard?:language=en-US&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
                allowfullscreen>
            </iframe>
        </div>
    </div>

</body>
</html>
