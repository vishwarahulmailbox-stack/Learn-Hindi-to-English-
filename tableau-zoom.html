<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tableau Dashboard | Accan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f2f2f2;
  }

  .top-header {
    background: #000;
    padding: 20px 40px;
    display: flex;
    align-items: center;
  }
  .top-header img { height: 48px; max-width: 100%; }

  .tableau-wrapper {
    background: #fff;
    padding: 40px 0;
    display: flex;
    justify-content: center;
  }

  .tableau-wix-container {
    position: relative;
    width: 95%;
    max-width: 1400px;
    height: 1850px;
    overflow: hidden;
    background: #fff;
  }

  .tableau-wix-container iframe {
    width: 100%;
    height: 100%;
    border: 0;
  }

  /* Hide Tableau footer toolbar */
  .tableau-wix-container::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 50px;
    background: #fff;
    z-index: 9999;
    pointer-events: none;
  }

  /* ── Modal backdrop ── */
  #zoom-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 10000;
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }
  #zoom-backdrop.active {
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.22s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  /* ── Modal box ── */
  .zoom-modal {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55);
    overflow: hidden;
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 96vw;
    max-height: 92vh;
  }
  @keyframes popIn {
    from { transform: scale(0.88); opacity:0; }
    to   { transform: scale(1);    opacity:1; }
  }

  .zoom-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: #000;
    color: #fff;
  }
  .zoom-modal-header span { font-size: 15px; font-weight: 600; }

  .zoom-close-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .zoom-close-btn:hover { background: rgba(255,255,255,0.15); }

  .modal-iframe-wrap iframe { display: block; border: 0; }

  @media screen and (max-width: 768px) {
    .top-header { padding: 16px; }
    .top-header img { height: 36px; }
    .tableau-wix-container { height: 3050px; }
  }
</style>
</head>
<body>

<div class="top-header">
  <img src="https://i.ibb.co/Nj0PYDw/Pegion.jpg" alt="Pegion Logo">
</div>

<div class="tableau-wrapper">
  <div class="tableau-wix-container" id="mainContainer">
    <!--
      ✅ NO overlay divs needed at all.
      Tableau itself handles the click via URL Actions configured
      in Tableau Desktop → Dashboard → Actions → Go to URL.
      The iframe remains fully interactive at any screen size.
    -->
    <iframe
      id="tableauFrame"
      src="https://public.tableau.com/views/Trial_17743318838450/Dashboard1?:showVizHome=no&toolbar=no"
      scrolling="no"
      allowfullscreen>
    </iframe>
  </div>
</div>

<!-- ── Zoom Modal (opened by ?zoom= param or postMessage) ── -->
<div id="zoom-backdrop">
  <div class="zoom-modal" id="zoomModal">
    <div class="zoom-modal-header">
      <span id="modalChartName">Chart</span>
      <button class="zoom-close-btn" id="closeModalBtn" title="Close (Esc)">✕</button>
    </div>
    <div class="modal-iframe-wrap" id="modalIframeWrap"></div>
  </div>
</div>

<script>
(function () {

  /* ─────────────────────────────────────────────────────────────────
    SHEET REGISTRY
    ─────────────────────────────────────────────────────────────────
    Key   = exact Tableau sheet/tab name (used in the URL Action and
            in the ?zoom= query param)
    Value = friendly label shown in the modal header

    This is the ONLY place you need to edit when sheets change.
  ───────────────────────────────────────────────────────────────── */
  const SHEET_REGISTRY = {
    Sheet1: "Series title 1",
    Sheet2: "Series title 2",
    Sheet3: "Series title 3",
    Sheet4: "Series title 4",
    Sheet5: "Series title 5",
    Sheet6: "Status",
    Sheet7: "Subject",
    Sheet8: "Units",
  };

  const BASE_URL = "https://public.tableau.com/views/Trial_17743318838450/";

  const backdrop = document.getElementById("zoom-backdrop");
  const modal    = document.getElementById("zoomModal");
  const nameEl   = document.getElementById("modalChartName");
  const wrapEl   = document.getElementById("modalIframeWrap");
  const closeBtn = document.getElementById("closeModalBtn");

  /* Modal dimensions: 88% of viewport, capped at 1300 × 820 */
  const MODAL_W = Math.min(Math.round(window.innerWidth  * 0.88), 1300);
  const MODAL_H = Math.min(Math.round(window.innerHeight * 0.80), 820);
  modal.style.width   = MODAL_W + "px";
  wrapEl.style.width  = MODAL_W + "px";
  wrapEl.style.height = MODAL_H + "px";

  /* ── Open modal for a given sheet key ── */
  function openModal(sheetKey) {
    const label = SHEET_REGISTRY[sheetKey] || sheetKey;
    nameEl.textContent = label;
    const url = BASE_URL + sheetKey + "?:showVizHome=no&:toolbar=no&:embed=y";
    wrapEl.innerHTML =
      `<iframe src="${url}" width="${MODAL_W}" height="${MODAL_H}"
               allowfullscreen style="border:0"></iframe>`;
    backdrop.classList.add("active");
    document.body.style.overflow = "hidden";
  }

  /* ── Close modal ── */
  function closeModal() {
    backdrop.classList.remove("active");
    document.body.style.overflow = "";
    history.replaceState(null, "", window.location.pathname);
    setTimeout(() => { wrapEl.innerHTML = ""; }, 260);
  }

  closeBtn.addEventListener("click", closeModal);
  backdrop.addEventListener("click", e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && backdrop.classList.contains("active")) closeModal();
  });

  /* ─────────────────────────────────────────────────────────────────
    SCENARIO A — Page opened fresh with ?zoom=SheetX
    ─────────────────────────────────────────────────────────────────
    Tableau URL Action target: "Web Page" (embedded) or "New Tab"
    URL pattern:  https://yoursite.com/tableau-overlay.html?zoom=Sheet3

    The ?zoom= value must match a key in SHEET_REGISTRY exactly.
  ───────────────────────────────────────────────────────────────── */
  const params   = new URLSearchParams(window.location.search);
  const zoomKey  = params.get("zoom");
  if (zoomKey && SHEET_REGISTRY[zoomKey]) {
    openModal(zoomKey);
  }

  /* ─────────────────────────────────────────────────────────────────
    SCENARIO B — Cross-window postMessage
    ─────────────────────────────────────────────────────────────────
    Set the Tableau URL Action target to "New Browser Window".
    Create a tiny redirect page at the action URL, e.g. zoom-relay.html:

      <!DOCTYPE html><html><body><script>
        const sheet = new URLSearchParams(location.search).get("zoom");
        if (window.opener) {
          window.opener.postMessage({ type:"tableau-zoom", sheet }, "*");
          window.close();
        }
      <\/script></body></html>

    The relay page pings this dashboard window, then closes itself.
    The dashboard opens the modal without ever navigating away.
  ───────────────────────────────────────────────────────────────── */
  window.addEventListener("message", e => {
    if (e.data && e.data.type === "tableau-zoom" && e.data.sheet) {
      openModal(e.data.sheet);
    }
  });

})();
</script>
</body>
</html>
